embedding_size: 512
latent_size: 64
feat_embed_dim: 64

is_federated: True
is_multimodal_model: True

learner: 'SGD'

clip_grad_norm: 1.0

use_neg_sampling: True

# lr: 1e-1
# reg_weight: 1e-1
# hyper_parameters: []
# epochs: 1 # 100
# local_epochs: 1

lr: [ 1e2, 1e1, 1e0, 1e-1,1e-2,1e-3,1e-4 ]
reg_weight: [1.0, 1e-01, 1e-02, 1e-03, 1e-04, 1e-05]
# reg_weight: 1
hyper_parameters: ["lr", "reg_weight"]
